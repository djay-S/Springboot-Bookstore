spring.application.name=catalog-service
server.port=8081
server.shutdown=graceful

catalog.page-size = 10

######### Actuator configuration #########
#By default, spring actuator exposes only health endpoints
#By using the following attribute, we can expose all the actuator endpoints
management.endpoints.web.exposure.include=*

#By default, the bellow is in simple mode
#When set to full, all the details from `git.properties` file generated by maven, is shown to actuator
management.info.git.mode=full

management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=false
management.tracing.sampling.probability=1.0

#Bellow properties are defined in the environment variables.
#If they are not present, the default values will be considered after the ':'
######### Database configuration #########
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:15432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}