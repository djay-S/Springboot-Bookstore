---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: keycloak
spec:
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.2
#          command: ['start-dev', '--import-realm', '--http-port=9191']   # Alternative approach:
#          command:                                                        #   Uses `command:` instead of `args:`.
                                                                          #   `command:` replaces the container's ENTRYPOINT entirely,
                                                                          #   while `args:` appends to it. `args:` is preferred because
                                                                          #   it preserves Keycloak's default ENTRYPOINT behaviour.
          args:
            - start-dev
            - --import-realm
            - --http-port=9191
            - --hostname-url=http://keycloak   # Public URL Keycloak publishes in its OIDC discovery
                                              # document. Must match the issuer clients expect
                                              # (OAUTH2_SERVER_URL). The browser is redirected
                                              # here for login.
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
#              mountPath: ./realm-config:/opt/keycloak/data/import     # Docker Compose syntax —
                                                                      # kept for reference.
                                                                      # K8s uses a ConfigMap mount
                                                                      # instead.
          ports:
            - containerPort: 9191
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin123

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: keycloak-server
      port: 80       # Default HTTP port — pods and Ingress both use `http://keycloak`
                     # without specifying a port. The container still listens on 9191
                     # internally; the Service maps 80 → targetPort 9191.
#      port: 9191    # Original port — kept for reference.
      targetPort: 9191