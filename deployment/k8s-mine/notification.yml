# ═══════════════════════════════════════════════════════════
# notification-service — Email notifications
# ═══════════════════════════════════════════════════════════
# Spring Boot app that sends email notifications when orders
# are created, delivered, or cancelled.
#
# How it works:
#   1. Listens to RabbitMQ queues for order events
#      (published by the order-service)
#   2. When an event arrives (e.g. "order created"),
#      it sends an email via MailHog (a fake SMTP server for dev)
#
# This is an event-driven service — it does NOT have a REST API.
# It only reads from RabbitMQ and sends emails.
#
# Queues it listens to (bound to exchange "orders-exchange"):
#   new-orders, delivered-orders, cancelled-orders, error-orders
# ═══════════════════════════════════════════════════════════

# ─── Deployment ────────────────────────────────────────
kind: Deployment
apiVersion: apps/v1
metadata:
  name: bookstore-notification-deployment
spec:
  selector:
    matchLabels:
      app: bookstore-notification-service
  template:
    metadata:
      labels:
        app: bookstore-notification-service
    spec:
      containers:
        - name: bookstore-notification-pod
          image: dhananjaysinghkushwaha/bookstore-notification-service:latest
          ports:
            # Matches server.port=8083 in application.properties
            - containerPort: 8083
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          env:
            # ── Database ────────────────────────────────
            # Stores processed events so it doesn't send
            # duplicate emails after a restart.
            # Runs on host via Docker.
            - name: DB_URL
              value: jdbc:postgresql://host.minikube.internal:35432/postgres
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            # ── Kubernetes probes ─────────────────────────
            # Enables Spring Boot Actuator liveness/readiness
            # endpoints at /actuator/health/liveness and
            # /actuator/health/readiness for K8s probe checks.
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: MANAGEMENT_HEALTH_READINESSSTATE_ENABLED
              value: "true"
            - name: MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED
              value: "true"

            # ── RabbitMQ (event consumer) ───────────────
            # Notification service listens to order events
            # published by order-service to RabbitMQ.
            # RabbitMQ runs on host via Docker.
            - name: RABBITMQ_HOST
              value: host.minikube.internal
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              value: guest
            - name: RABBITMQ_PASSWORD
              value: guest

            # ── MailHog (fake SMTP for dev) ─────────────
            # Sends email notifications via MailHog.
            # MailHog runs on host via Docker.
            - name: MAIL_HOST
              value: host.minikube.internal
            - name: MAIL_PORT
              value: "1025"

---
# ─── Service ──────────────────────────────────────────
# Other pods can reach this service at:
#   http://bookstore-notification-service:8083
# ─────────────────────────────────────────────────────
kind: Service
apiVersion: v1
metadata:
  name: bookstore-notification-service
spec:
  selector:
    app: bookstore-notification-service
  ports:
    - name: notification-server-port
      protocol: TCP
      port: 8083
      targetPort: 8083
