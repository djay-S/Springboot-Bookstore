# ═══════════════════════════════════════════════════════════
# catalog-service — Product catalog
# ═══════════════════════════════════════════════════════════
# Spring Boot app that stores and serves product data.
# Uses PostgreSQL for storage, Flyway for database migrations.
#
# Who calls this service?
#   - api-gateway forwards external HTTP requests to it
#     (e.g., GET /api/products?page=1)
#   - order-service calls it directly (RestClient, NOT through
#     the gateway) to validate product codes when creating orders
#
# After deployment, reachable at: http://catalog-service:8081
# ═══════════════════════════════════════════════════════════

# ─── Old bare Pod (kept for reference) ─────────────────
# This was replaced by a Deployment below because a bare Pod
# won't restart if it crashes. A Deployment manages pods and
# keeps them running automatically.
# ─────────────────────────────────────────────────────
#kind: Pod
#apiVersion: v1
#metadata:
