# ═══════════════════════════════════════════════════════════
# order-service — Order management
# ═══════════════════════════════════════════════════════════
# Spring Boot app that handles order creation and tracking.
# Uses PostgreSQL for storage, RabbitMQ to publish events,
# and OAuth2 (Keycloak) to validate user authentication.
#
# Who calls this service?
#   - api-gateway forwards external HTTP requests to it
#     (browser → webapp → gateway → order-service)
#
# Who does this service call?
#   - catalog-service (directly, NOT through the gateway)
#     to check product codes exist and fetch prices
#
# Events published to RabbitMQ:
#   Exchange: orders-exchange
#   Queues: new-orders, delivered-orders, cancelled-orders, error-orders
# ═══════════════════════════════════════════════════════════

# ─── Deployment ────────────────────────────────────────
kind: Deployment
apiVersion: apps/v1
metadata:
  name: bookstore-order-deployment
spec:
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      # This label must match the Service selector below.
      labels:
        app: order-service
    spec:
      containers:
        - name: bookstore-order-pod
          image: dhananjaysinghkushwaha/bookstore-order-service:latest
          ports:
            # Matches server.port=8082 in application.properties
            - containerPort: 8082
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          env:
            # ── Database ────────────────────────────────
            # PostgreSQL for orders. Runs on host via Docker.
            # Maps to: spring.datasource.url
            - name: DB_URL
              value: jdbc:postgresql://host.minikube.internal:25432/postgres
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: postgres

            # ── RabbitMQ (message broker) ──────────────────
            # Order service publishes events to RabbitMQ.
            # Notification-service listens to these events.
            # RabbitMQ runs on host via Docker.
            # Maps to: spring.rabbitmq.host / .port / .username / .password
            - name: RABBITMQ_HOST
              value: host.minikube.internal
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              value: guest
            - name: RABBITMQ_PASSWORD
              value: guest

            # ── Keycloak (OAuth2 authentication) ──────────
            # Validates JWT tokens sent by the webapp via the
            # api-gateway. Pods resolve "keycloak" via K8s DNS
            # to the Service ClusterIP on port 80.
            # Maps to: OAUTH2_SERVER_URL in application.properties
            - name: OAUTH2_SERVER_URL
              value: http://keycloak

            # ── Catalog service client ────────────────────
            # Validates product codes and fetches prices via
            # RestClient (direct call, NOT through api-gateway).
            # Wrapped with Resilience4j (retry + circuit breaker).
            # Maps to: orders.catalog-service-url
            - name: ORDERS_CATALOG_SERVICE_URL
              value: http://catalog-service:8081

            # ── Kubernetes probes ─────────────────────────
            # Enables Spring Boot Actuator liveness/readiness
            # endpoints at /actuator/health/liveness and
            # /actuator/health/readiness for K8s probe checks.
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: MANAGEMENT_HEALTH_READINESSSTATE_ENABLED
              value: "true"
            - name: MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED
              value: "true"

---
# ─── Service ──────────────────────────────────────────
# Other pods can reach this service at:
#   http://order-service:8082
# ─────────────────────────────────────────────────────
kind: Service
apiVersion: v1
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: order-server-port
      protocol: TCP
      port: 8082
      targetPort: 8082
